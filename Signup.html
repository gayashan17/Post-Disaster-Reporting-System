<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/css/jquery.dataTables.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="style.css" rel="stylesheet" />

</head>
<body>
<main id="main"  class="login-wrapper d-flex justify-content-center align-items-center min-vh-100">
    <div class="loginPanel">
        <div>
            <img src="C:\NIBM\Final Project\Post Disaster Reporting System\pictures\Post-Disaster-Reporting-Logo.png" width="55%">
        </div>
        <div class="panel-header justify-content-center">
            <div class="panel-title">
                <h4 style="font-weight:bold;">Create Your Account</h4>
            </div>
        </div>
        <div class="mb-4">Register to submit disaster reports and track compensation requests</div>

        <div class="input-group mb-4 w-100">
              <span class="input-group-text">
                <i class="bi bi-person"></i>
              </span>
            <input type="text" class="form-control " id="fullname-input" placeholder="Username">
        </div>

        <div class="input-group mb-4 w-100">
              <span class="input-group-text">
                <i class="bi bi-person-lines-fill"></i>
              </span>
            <input type="text" class="form-control " id="username-input" placeholder="Full Name">
        </div>

        <div class="input-group mb-4 w-100">
              <span class="input-group-text">
                <i class="bi bi-person-badge"></i>
              </span>
            <input type="text" class="form-control " id="nic-input" placeholder="National Identity Card (NIC) Number">
        </div>

        <div class="input-group mb-4 w-100">
              <span class="input-group-text">
                <i class="bi bi-house"></i>
              </span>
            <input type="text" class="form-control " id="address-input" placeholder="Home Address">
        </div>

        <div class="input-group mb-4 w-100">
              <span class="input-group-text">
                <i class="bi bi-phone"></i>
              </span>
            <input type="tel" class="form-control" id="phoneNo-input" placeholder="Mobile Number">
        </div>

        <div class="input-group mb-4 w-100">
              <span class="input-group-text">
                <i class="bi bi-envelope"></i>
              </span>
            <input type="email" class="form-control " id="email-input" placeholder="Email Address">
        </div>

        <div class="input-group mb-4 w-100">
              <span class="input-group-text">
                <i class="bi bi-key"></i>
              </span>
            <input type="password" class="form-control border-start-0 ps-0" id="password-input" placeholder="Password">
            <span class="input-group-text bg-white  " id="togglePassword" style="cursor: pointer;">
                <i class="bi bi-eye" id="eyeIcon"></i>
            </span>
        </div>

        <button type="button" class=" btn btn-primary btn-lg btn-block w-100" style="">REGISTER</button>
        <div style="padding-top:25px">
            Already have an account? <a href="Login.html" class="stat-link" style="font-size:16px">Login Here</a>
        </div>
    </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.8/sweetalert2.all.min.js"></script>

<script src="Signup.js"></script>
</body>
</html>
